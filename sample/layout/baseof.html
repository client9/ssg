<!DOCTYPE HTML>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{{- with .Title }}
<title>{{ . }}</title>
{{ end -}}
</head>
<body>
<nav><a href="/tags/index.html">All Tags</a></nav>
{{- block "main" . -}}
{{ .Content }}
{{- with .Tags -}}
<p>Tags:
{{- range . }} <a href="/tags/{{ . }}/index.html">{{ . }}</a>{{ end }}
</p>
{{- end -}}
{{- end -}}
</body>
</html>
